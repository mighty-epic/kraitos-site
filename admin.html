<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kraitos - Access Console</title>
    <meta name="description" content="Administration portal for waitlist management and beta approvals." />
    <meta name="theme-color" content="#04080a" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%2304080a'/%3E%3Cpath d='M17 46V18h8v11l13-11h11L33 31l17 15H38L25 34v12z' fill='%2349f6dc'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css?v=1.3.0" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --dark-bg: #04080a;
        --darker-bg: #020406;
        --cyan: #49f6dc;
        --cyan-dim: rgba(73, 246, 220, 0.1);
        --cyan-border: rgba(73, 246, 220, 0.25);
        --cyan-hover: rgba(73, 246, 220, 0.2);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --card-bg: rgba(6, 12, 16, 0.7);
        --glass-bg: rgba(10, 20, 26, 0.4);
        --border-glass: rgba(255, 255, 255, 0.05);
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--dark-bg);
        color: var(--text-main);
        min-height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        background-image: 
          radial-gradient(circle at 10% 20%, rgba(73, 246, 220, 0.05) 0%, transparent 40%),
          radial-gradient(circle at 90% 80%, rgba(73, 246, 220, 0.03) 0%, transparent 40%);
      }

      h1, h2, h3, h4, .console-title {
        font-family: 'Outfit', sans-serif;
      }

      /* Auth Gate Section */
      #auth-gate {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .auth-card {
        width: 100%;
        max-width: 420px;
        padding: 40px;
        border-radius: 16px;
        background: var(--card-bg);
        border: 1px solid var(--cyan-border);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 20px rgba(73, 246, 220, 0.05);
        backdrop-filter: blur(16px);
        text-align: center;
      }

      .auth-logo {
        width: 48px;
        height: 48px;
        background: var(--cyan-dim);
        border: 1px solid var(--cyan-border);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px auto;
        color: var(--cyan);
        font-size: 24px;
        font-weight: 700;
        font-family: 'Outfit', sans-serif;
      }

      .auth-card h2 {
        margin: 0 0 8px 0;
        font-size: 24px;
        font-weight: 600;
      }

      .auth-card p {
        color: var(--text-muted);
        font-size: 14px;
        margin: 0 0 32px 0;
      }

      .auth-input-group {
        margin-bottom: 24px;
        text-align: left;
      }

      .auth-label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .auth-input {
        width: 100%;
        padding: 12px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.2);
        color: var(--text-main);
        font-size: 16px;
        box-sizing: border-box;
        transition: all 0.2s ease;
      }

      .auth-input:focus {
        outline: none;
        border-color: var(--cyan);
        box-shadow: 0 0 10px rgba(73, 246, 220, 0.15);
      }

      .auth-btn {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: none;
        background: var(--cyan);
        color: var(--dark-bg);
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .auth-btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(73, 246, 220, 0.3);
      }

      .auth-error {
        color: #ef4444;
        font-size: 14px;
        margin-top: 16px;
        min-height: 20px;
      }

      /* Console View Section */
      #console-view {
        display: none;
        flex: 1;
        padding: 40px 24px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        box-sizing: border-box;
      }

      .console-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .console-brand {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .console-brand-logo {
        width: 40px;
        height: 40px;
        background: var(--cyan-dim);
        border: 1px solid var(--cyan-border);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--cyan);
        font-size: 20px;
        font-weight: 700;
        font-family: 'Outfit', sans-serif;
      }

      .console-title {
        font-size: 28px;
        font-weight: 600;
        margin: 0;
      }

      .console-status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--cyan);
        background: var(--cyan-dim);
        padding: 4px 12px;
        border-radius: 50px;
        border: 1px solid var(--cyan-border);
        font-weight: 600;
        text-transform: uppercase;
      }

      .status-pulse {
        width: 6px;
        height: 6px;
        background: var(--cyan);
        border-radius: 50%;
        box-shadow: 0 0 8px var(--cyan);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% { transform: scale(0.9); opacity: 0.6; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(0.9); opacity: 0.6; }
      }

      .logout-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-muted);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .logout-btn:hover {
        border-color: #ef4444;
        color: #ef4444;
        background: rgba(239, 68, 68, 0.05);
      }

      /* Stats Overview */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        padding: 24px;
        border-radius: 12px;
        background: var(--card-bg);
        border: 1px solid var(--border-glass);
        backdrop-filter: blur(16px);
      }

      .stat-card .stat-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .stat-card .stat-value {
        font-size: 36px;
        font-weight: 700;
        font-family: 'Outfit', sans-serif;
        color: var(--text-main);
      }

      .stat-card.highlight {
        border-color: var(--cyan-border);
        box-shadow: 0 0 15px rgba(73, 246, 220, 0.03);
      }

      .stat-card.highlight .stat-value {
        color: var(--cyan);
      }

      /* Controls & Table Card */
      .dashboard-card {
        border-radius: 16px;
        background: var(--card-bg);
        border: 1px solid var(--border-glass);
        backdrop-filter: blur(16px);
        overflow: hidden;
      }

      .card-toolbar {
        padding: 24px;
        border-bottom: 1px solid var(--border-glass);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 16px;
      }

      .search-box {
        position: relative;
        max-width: 300px;
        width: 100%;
      }

      .search-input {
        width: 100%;
        padding: 10px 16px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(0, 0, 0, 0.15);
        color: var(--text-main);
        font-size: 14px;
        box-sizing: border-box;
      }

      .search-input:focus {
        outline: none;
        border-color: var(--cyan);
      }

      .filter-tabs {
        display: flex;
        gap: 8px;
        background: rgba(0, 0, 0, 0.2);
        padding: 4px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      .filter-tab {
        background: transparent;
        border: none;
        color: var(--text-muted);
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .filter-tab:hover {
        color: var(--text-main);
      }

      .filter-tab.active {
        background: var(--cyan);
        color: var(--dark-bg);
        font-weight: 600;
      }

      /* Table Styles */
      .table-responsive {
        overflow-x: auto;
      }

      .users-table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      .users-table th {
        padding: 16px 24px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        border-bottom: 1px solid var(--border-glass);
        letter-spacing: 0.05em;
      }

      .users-table td {
        padding: 18px 24px;
        font-size: 14px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        vertical-align: middle;
      }

      .users-table tr:last-child td {
        border-bottom: none;
      }

      .email-cell {
        font-weight: 500;
        color: var(--text-main);
      }

      .date-cell {
        color: var(--text-muted);
        font-size: 13px;
      }

      /* Badges */
      .status-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 50px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .status-badge.pending {
        background: rgba(107, 114, 128, 0.15);
        color: #9ca3af;
        border: 1px solid rgba(107, 114, 128, 0.25);
      }

      .status-badge.verified {
        background: rgba(245, 158, 11, 0.15);
        color: #fbbf24;
        border: 1px solid rgba(245, 158, 11, 0.25);
      }

      .status-badge.approved {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.25);
      }

      /* Approve Button Actions */
      .action-btn {
        background: transparent;
        border: 1px solid var(--cyan-border);
        color: var(--cyan);
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-width: 100px;
      }

      .action-btn:hover:not(:disabled) {
        background: var(--cyan);
        color: var(--dark-bg);
        box-shadow: 0 0 10px rgba(73, 246, 220, 0.2);
      }

      .action-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        border-color: rgba(255, 255, 255, 0.05);
        color: var(--text-muted);
      }

      .action-btn.approved-btn {
        border-color: rgba(16, 185, 129, 0.3);
        color: #34d399;
        background: rgba(16, 185, 129, 0.05);
        cursor: default;
      }

      .action-btn.loading {
        color: transparent !important;
        position: relative;
      }

      .action-btn.loading::after {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        border: 2px solid;
        border-color: currentColor transparent currentColor transparent;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      /* Copy Link Area */
      .copy-link-container {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        background: rgba(0, 0, 0, 0.3);
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        max-width: 320px;
      }

      .copy-link-text {
        font-size: 11px;
        font-family: monospace;
        color: var(--cyan);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      .copy-link-btn {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 2px 6px;
        font-size: 11px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.04);
        transition: all 0.2s ease;
      }

      .copy-link-btn:hover {
        color: var(--text-main);
        background: rgba(255, 255, 255, 0.08);
      }

      .empty-state {
        padding: 80px 24px;
        text-align: center;
        color: var(--text-muted);
      }

      .empty-state svg {
        margin-bottom: 16px;
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <!-- Auth Gate -->
    <section id="auth-gate">
      <div class="auth-card">
        <div class="auth-logo">K</div>
        <h2>Access Console</h2>
        <p>Authenticate to manage beta permissions</p>
        <form id="auth-form">
          <div class="auth-input-group">
            <label class="auth-label" for="admin-password">Admin Password</label>
            <input type="password" id="admin-password" class="auth-input" placeholder="••••••••" required autocomplete="current-password"/>
          </div>
          <button type="submit" class="auth-btn">Authenticate</button>
        </form>
        <div id="auth-error" class="auth-error"></div>
      </div>
    </section>

    <!-- Console View -->
    <main id="console-view">
      <header class="console-header">
        <div class="console-brand">
          <div class="console-brand-logo">K</div>
          <div>
            <h1 class="console-title">Kraitos Access Console</h1>
            <div class="console-status-pill">
              <div class="status-pulse"></div>
              <span>Secured System Live</span>
            </div>
          </div>
        </div>
        <button id="logout-btn" class="logout-btn">Sign Out</button>
      </header>

      <!-- Stats -->
      <section class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Waitlistees</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card highlight">
          <div class="stat-label">Verified (Awaiting Approval)</div>
          <div class="stat-value" id="stat-verified">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Approved Accounts</div>
          <div class="stat-value" id="stat-approved">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Pending Verification</div>
          <div class="stat-value" id="stat-pending">0</div>
        </div>
      </section>

      <!-- Table View -->
      <section class="dashboard-card">
        <div class="card-toolbar">
          <div class="search-box">
            <input type="text" id="search-input" class="search-input" placeholder="Search by email..." />
          </div>
          <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="verified">Verified</button>
            <button class="filter-tab" data-filter="approved">Approved</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
          </div>
        </div>

        <div class="table-responsive">
          <table class="users-table">
            <thead>
              <tr>
                <th>Email Address</th>
                <th>Status</th>
                <th>Registration Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <!-- Rendered Dynamically -->
            </tbody>
          </table>
          <div id="empty-state" class="empty-state" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            <p>No waitlist submissions match your filter criteria.</p>
          </div>
        </div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
